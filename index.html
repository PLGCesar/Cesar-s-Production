<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen pb-24">

    <!-- Header -->
    <header class="bg-red-600 text-white p-6 shadow-md text-center">
        <!-- Toque 5 vezes no título para abrir o Admin -->
        <h1 id="restaurant-name" onclick="triggerAdmin()" class="text-2xl font-bold cursor-pointer select-none">
            Carregando Lanchonete...
        </h1>
        <p class="text-sm opacity-90">Toque 5 vezes no título para o painel de controle</p>
    </header>

    <!-- Menu Principal -->
    <main class="max-w-md mx-auto p-4" id="menu-container">
        <!-- Os itens serão renderizados aqui dinamicamente -->
    </main>

    <!-- Modal do Carrinho de Compras (Barra flutuante) -->
    <div id="cart-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 shadow-lg flex justify-between items-center max-w-md mx-auto hidden z-40">
        <div>
            <p class="text-sm text-gray-500">Total do Pedido</p>
            <p class="text-xl font-bold text-red-600" id="cart-total">R$ 0,00</p>
        </div>
        <button onclick="openCheckoutModal()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg shadow-md transition">
            Ver Sacola
        </button>
    </div>

    <!-- Modal de Finalização / Dados de Entrega -->
    <div id="checkout-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-lg p-6 w-full max-w-sm">
            <h3 class="text-lg font-bold mb-4">Finalizar Pedido</h3>
            <input type="text" id="cust-name" placeholder="Seu Nome" class="w-full border p-2 rounded mb-3">
            <input type="text" id="cust-address" placeholder="Endereço de Entrega (ou Retirada)" class="w-full border p-2 rounded mb-3">
            <select id="payment-method" class="w-full border p-2 rounded mb-4">
                <option value="Pix">Pix</option>
                <option value="Cartão de Crédito/Débito">Cartão de Crédito/Débito</option>
                <option value="Dinheiro">Dinheiro</option>
            </select>
            <div class="flex space-x-2">
                <button onclick="closeCheckoutModal()" class="w-1/2 bg-gray-300 py-2 rounded">Voltar</button>
                <button onclick="sendWhatsAppOrder()" class="w-1/2 bg-green-600 text-white py-2 rounded font-bold">Enviar no WhatsApp</button>
            </div>
        </div>
    </div>

    <!-- Painel Admin Secreto (Modal) -->
    <div id="admin-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-lg p-6 w-full max-w-md max-h-[90vh] overflow-y-auto shadow-2xl">
            <h3 class="text-lg font-bold mb-2 text-red-600">Painel de Controle</h3>
            <p class="text-xs text-gray-500 mb-4">Gerencie as informações básicas e os produtos do cardápio.</p>
            
            <!-- Senha de Segurança -->
            <label class="block text-xs font-bold text-gray-700 mb-1">Senha do Admin</label>
            <input type="password" id="admin-pass" placeholder="Digite a senha para salvar" class="w-full border p-2 rounded mb-4">
            
            <!-- Campo simples para Nome da Lanchonete -->
            <label class="block text-xs font-bold text-gray-700 mb-1">Nome da Lanchonete</label>
            <input type="text" id="admin-restaurant-name" class="w-full border p-2 rounded mb-4">
            
            <!-- Campo simples para o Número do WhatsApp -->
            <label class="block text-xs font-bold text-gray-700 mb-1">WhatsApp do Estabelecimento (Ex: 5511999999999)</label>
            <input type="text" id="admin-phone" class="w-full border p-2 rounded mb-4" placeholder="Código do país + DDD + Número">
            
            <!-- Editor das Categorias e Produtos (JSON) -->
            <label class="block text-xs font-bold text-gray-700 mb-1">Produtos e Categorias (JSON)</label>
            <textarea id="menu-json-editor" class="w-full h-48 border p-2 font-mono text-xs rounded mb-4" placeholder="Categorias do cardápio..."></textarea>
            
            <div class="flex space-x-2">
                <button onclick="closeAdmin()" class="w-1/2 bg-gray-300 py-2 rounded transition">Cancelar</button>
                <button onclick="saveMenu()" class="w-1/2 bg-red-600 text-white py-2 rounded font-bold transition">Salvar Alterações</button>
            </div>
        </div>
    </div>

    <script>
        let menuData = {};
        let cart = {};
        let clickCount = 0;

        // Buscar dados do cardápio ao iniciar a página
        async function loadMenu() {
            try {
                const response = await fetch('/api/menu');
                menuData = await response.json();
                
                document.getElementById('restaurant-name').innerText = menuData.restaurantName || "Lanchonete";
                renderMenu();
            } catch (error) {
                alert("Erro ao carregar cardápio. Verifique a conexão.");
            }
        }

        // Renderiza as categorias e itens do cardápio dinamicamente
        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';

            if (!menuData.categories) return;

            menuData.categories.forEach(category => {
                const catHeader = document.createElement('h2');
                catHeader.className = "text-xl font-bold mt-6 mb-3 border-b-2 border-red-200 pb-1";
                catHeader.innerText = category.name;
                container.appendChild(catHeader);

                category.items.forEach(item => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = "bg-white p-4 rounded-lg shadow-sm mb-3 flex justify-between items-center border border-gray-100";
                    itemDiv.innerHTML = `
                        <div class="flex-1 pr-4">
                            <h3 class="font-bold text-gray-800">${item.name}</h3>
                            <p class="text-xs text-gray-500 mt-1">${item.description || ''}</p>
                            <p class="text-sm font-semibold text-red-600 mt-2">R$ ${item.price.toFixed(2)}</p>
                        </div>
                        <div class="flex items-center space-x-2">
                            <button onclick="changeQty(${item.id}, -1)" class="bg-gray-200 text-gray-700 px-3 py-1 rounded font-bold">-</button>
                            <span id="qty-${item.id}" class="font-bold w-4 text-center">0</span>
                            <button onclick="changeQty(${item.id}, 1, '${item.name}', ${item.price})" class="bg-red-600 text-white px-3 py-1 rounded font-bold">+</button>
                        </div>
                    `;
                    container.appendChild(itemDiv);
                });
            });
        }

        // Altera quantidade de itens no carrinho
        function changeQty(id, delta, name, price) {
            if (!cart[id]) {
                if (delta <= 0) return;
                cart[id] = { id, name, price, qty: 0 };
            }

            cart[id].qty += delta;

            if (cart[id].qty <= 0) {
                delete cart[id];
                document.getElementById(`qty-${id}`).innerText = 0;
            } else {
                document.getElementById(`qty-${id}`).innerText = cart[id].qty;
            }

            updateCartBar();
        }

        // Atualiza a barra do total flutuante no rodapé
        function updateCartBar() {
            let total = 0;
            let itemsCount = 0;

            for (let id in cart) {
                total += cart[id].price * cart[id].qty;
                itemsCount += cart[id].qty;
            }

            const cartBar = document.getElementById('cart-bar');
            if (itemsCount > 0) {
                cartBar.classList.remove('hidden');
                document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2)}`;
            } else {
                cartBar.classList.add('hidden');
            }
        }

        function openCheckoutModal() {
            document.getElementById('checkout-modal').classList.remove('hidden');
        }

        function closeCheckoutModal() {
            document.getElementById('checkout-modal').classList.add('hidden');
        }

        // Formata a mensagem e abre o WhatsApp para enviar o pedido
        function sendWhatsAppOrder() {
            const name = document.getElementById('cust-name').value.trim();
            const address = document.getElementById('cust-address').value.trim();
            const payment = document.getElementById('payment-method').value;

            if (!name || !address) {
                alert("Por favor, preencha o seu nome e endereço de entrega.");
                return;
            }

            let msg = `*Novo Pedido - ${menuData.restaurantName}*\n`;
            msg += `--------------------------------\n`;
            msg += `*Cliente:* ${name}\n`;
            msg += `*Endereço:* ${address}\n`;
            msg += `*Pagamento:* ${payment}\n`;
            msg += `--------------------------------\n`;
            msg += `*Itens:*\n`;

            let total = 0;
            for (let id in cart) {
                const subtotal = cart[id].price * cart[id].qty;
                msg += `- ${cart[id].qty}x ${cart[id].name} (R$ ${subtotal.toFixed(2)})\n`;
                total += subtotal;
            }

            msg += `--------------------------------\n`;
            msg += `*Total Geral: R$ ${total.toFixed(2)}*`;

            const encodedMsg = encodeURIComponent(msg);
            const whatsappUrl = `https://wa.me/${menuData.phone}?text=${encodedMsg}`;

            window.open(whatsappUrl, '_blank');
            closeCheckoutModal();
        }

        // Abre o modal administrativo se o título for clicado 5 vezes
        function triggerAdmin() {
            clickCount++;
            if (clickCount >= 5) {
                clickCount = 0;
                
                // Preenche os campos simples
                document.getElementById('admin-restaurant-name').value = menuData.restaurantName || "";
                document.getElementById('admin-phone').value = menuData.phone || "";
                
                // Exibe apenas as categorias no editor JSON para evitar que quebrem as propriedades principais
                document.getElementById('menu-json-editor').value = JSON.stringify(menuData.categories || [], null, 2);
                
                document.getElementById('admin-modal').classList.remove('hidden');
            }
        }

        function closeAdmin() {
            document.getElementById('admin-modal').classList.add('hidden');
        }

        // Salva as alterações mesclando os inputs com o JSON das categorias
        async function saveMenu() {
            const password = document.getElementById('admin-pass').value;
            const nameInput = document.getElementById('admin-restaurant-name').value.trim();
            const phoneInput = document.getElementById('admin-phone').value.trim();
            let categoriesJson;

            try {
                categoriesJson = JSON.parse(document.getElementById('menu-json-editor').value);
            } catch (e) {
                alert("O JSON de produtos está inválido! Verifique a sintaxe.");
                return;
            }

            if (!nameInput || !phoneInput) {
                alert("Por favor, preencha o nome do restaurante e o número do WhatsApp.");
                return;
            }

            // Monta o objeto final do cardápio de forma organizada
            const finalMenuData = {
                restaurantName: nameInput,
                phone: phoneInput,
                categories: categoriesJson
            };

            const response = await fetch('/api/menu', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password, menuData: finalMenuData })
            });

            const result = await response.json();
            if (result.success) {
                alert("Configurações atualizadas com sucesso!");
                closeAdmin();
                loadMenu();
            } else {
                alert("Falha ao salvar: " + (result.error || "Verifique a senha"));
            }
        }

        window.onload = loadMenu;
    </script>
</body>
</html>
